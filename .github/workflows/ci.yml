name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate: fail the build if any HIGH or CRITICAL advisory is present in the
      # dependency tree. Moderate/low are reported but don't block (Dependabot
      # opens PRs for those on its own schedule).
      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — real values come from Vercel at deploy.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
