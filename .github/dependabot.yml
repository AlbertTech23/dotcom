version: 2
updates:
  # npm dependencies — weekly sweep + immediate PRs for security advisories.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundle routine non-security bumps into one PR to cut noise; security
      # updates still come through as their own PRs immediately.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # xlsx is pinned to the SheetJS CDN tarball (not the vulnerable npm package);
      # Dependabot can't resolve CDN URLs, so don't let it try to "update" it.
      - dependency-name: "xlsx"
      # Don't open routine major-version bumps (breaking changes — next 16, tailwind 4,
      # etc.). Minor/patch still flow, and SECURITY updates come through regardless of
      # this rule, so we stay patched without the upgrade-churn noise.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions used in workflows patched too (minor/patch only).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
